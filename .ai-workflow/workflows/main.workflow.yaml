execution_policy:
  strict_step_review: true
  document_dependency_gate: true
  forbid_auto_advance: true
  approval_keyword: 通过
  html_screen_review:
    enabled: true
    mode: one_screen_one_review
    require_approval_each_screen: true
stages:
  - name: 需求收集整理
    gate: 审核通过
  - name: 市场分析
    gate: 审核通过
    depends_on:
      - 需求收集整理
  - name: 政策调研
    gate: 审核通过
    depends_on:
      - 市场分析
  - name: 竞品调研
    gate: 审核通过
    depends_on:
      - 政策调研
  - name: 用户调研
    gate: 审核通过
    depends_on:
      - 竞品调研
  - name: 需求池
    gate: 审核通过
    depends_on:
      - 用户调研
      - 市场分析
      - 政策调研
      - 竞品调研
  - name: BRD
    gate: 审核通过
    depends_on:
      - 需求池
  - name: MRD
    gate: 审核通过
    depends_on:
      - BRD
  - name: 产品架构
    gate: 审核通过
    depends_on:
      - 需求池
      - BRD
      - MRD
  - name: HTML原型
    gate: 审核通过
    depends_on:
      - 产品架构
      - MRD
  - name: PRD
    gate: 审核通过
    depends_on:
      - HTML原型
      - 产品架构
      - 需求池

