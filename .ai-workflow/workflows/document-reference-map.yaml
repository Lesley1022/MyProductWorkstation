reference_principles:
  - principle: 必须引用
    description: 缺失会导致当前文档不完整，禁止提审。
  - principle: 可选引用
    description: 用于增强说服力，不影响基础成稿。
  - principle: 只引事实不引结论
    description: 仅引用客观证据，当前文档独立形成判断。
  - principle: 可追溯性
    description: 引用需标注来源位置（页码/需求ID/访谈编号）。

document_reference_map:
  - current_doc: 需求收集整理
    refs:
      - type: 外部输入
        source: 业务方、销售、客服、运营
        content: 需求描述、提出人/时间、业务场景、初步价值

  - current_doc: 市场分析报告
    refs:
      - type: 可选
        source: 需求收集整理
        content: 高频方向、关注领域
      - type: 外部数据
        source: 行业报告、政府数据、券商研报
        content: 市场规模、增长率、PEST、竞争格局

  - current_doc: 政策调研报告
    refs:
      - type: 必须
        source: 市场分析报告
        content: 目标市场定义、用户群体、区域范围
      - type: 外部数据
        source: 政府官网、政策文件
        content: 政策原文、条款、生效时间、发布机构

  - current_doc: 竞品分析报告
    refs:
      - type: 必须
        source: 政策调研报告
        content: 合规要求、鼓励方向、禁止条款
      - type: 可选
        source: 市场分析报告
        content: 玩家列表、份额数据

  - current_doc: 用户调研报告
    refs:
      - type: 必须
        source: 竞品分析报告
        content: 功能差异点、用户槽点、差异化假设
      - type: 可选
        source: 需求收集整理
        content: 高频反馈、用户原话

  - current_doc: 需求池
    refs:
      - type: 必须
        source: 用户调研报告
        content: 原声、痛点、场景、画像标签
      - type: 必须
        source: 市场分析报告
        content: 市场规模、增长趋势、细分机会
      - type: 必须
        source: 政策调研报告
        content: 合规要求、截止时间、鼓励方向
      - type: 必须
        source: 竞品分析报告
        content: 功能对照、空白点、优劣势

  - current_doc: BRD
    refs:
      - type: 必须
        source: 需求池
        content: P0/P1、需求价值、需求ID
      - type: 可选
        source: 市场分析报告
        content: 市场规模、增长趋势
      - type: 可选
        source: 政策调研报告
        content: 政策条款、红利信息
      - type: 可选
        source: 竞品分析报告
        content: 截图、定价、空白点
      - type: 可选
        source: 用户调研报告
        content: 用户原声、痛点量化

  - current_doc: MRD
    refs:
      - type: 必须
        source: BRD
        content: 产品方向、核心功能、目标用户
      - type: 可选
        source: 用户调研报告
        content: 画像卡片、旅程图、典型故事
      - type: 可选
        source: 竞品分析报告
        content: 体验对比

  - current_doc: 产品架构
    refs:
      - type: 必须
        source: 需求池
        content: P0/P1、功能点
      - type: 必须
        source: BRD
        content: 商业目标、ROI、扩展性
      - type: 必须
        source: MRD
        content: 场景、旅程、核心流程

  - current_doc: HTML原型
    refs:
      - type: 必须
        source: 产品架构
        content: 模块、功能、数据流向
      - type: 必须
        source: MRD
        content: 场景、用户故事、核心流程

  - current_doc: PRD
    refs:
      - type: 必须
        source: HTML原型
        content: 交互流程、页面布局、页面元素
      - type: 必须
        source: 产品架构
        content: 模块、数据流向、技术约束
      - type: 必须
        source: 需求池
        content: P0/P1、需求价值
      - type: 可选
        source: 用户调研报告
        content: 用户原声、场景细节

